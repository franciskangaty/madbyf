name: Build and Push Authorization Server

on:
  push:
    branches:
      - production
    tags:
      - "v*"
    paths:
      - "authorization/**"

  workflow_dispatch:

env:
  IMAGE_NAME: madbyf-authorization

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup GraalVM (Java 25) with automatic Maven dependency caching
      - name: Setup GraalVM (Java 25)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      # 2. Determine Version Tag
      # Uses the git tag if available; otherwise parses pom.xml to prevent unversioned builds
      - name: Determine Image Version Tag
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            cd authorization
            POM_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
            echo "version=v${POM_VERSION}" >> $GITHUB_OUTPUT
          fi

      # 3. Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Compile native binary and build container via Spring Boot Buildpacks
      # This registers the image in the local runner daemon as :latest
      - name: Build Native Container Image
        run: |
          cd authorization
          ./mvnw spring-boot:build-image -Pnative \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/authorization:latest \
            -DskipTests

      # 5. Tag and push exactly two targets: latest and your version
      - name: Tag and Push Production Images
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/authorization:latest ${{ secrets.DOCKERHUB_USERNAME }}/authorization:${{ steps.get_version.outputs.version }}
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authorization:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authorization:${{ steps.get_version.outputs.version }}
