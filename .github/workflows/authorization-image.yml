name: Build and Push Authorization Server

on:
  push:
    branches:
      - production
    tags:
      - "v*"
    paths:
      - "authorization/**"

  workflow_dispatch:

env:
  IMAGE_NAME: madbyf-authorization

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup GraalVM (Java 25) with automatic Maven dependency caching
      - name: Setup GraalVM (Java 25)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      # 2. Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Compile native binary and build container via Spring Boot Buildpacks
      # This builds the image locally in the runner's Docker daemon tagged as :latest
      - name: Build Production Native Container Image
        run: |
          cd authorization
          ./mvnw spring-boot:build-image -Pnative \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/authorization:latest \
            -DskipTests

      # 4. Create the additional image aliases (tags) and push everything to Docker Hub
      - name: Tag and Push Production Images
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/authorization:latest ${{ secrets.DOCKERHUB_USERNAME }}/authorization:${{ github.sha }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/authorization:latest ${{ secrets.DOCKERHUB_USERNAME }}/authorization:${{ github.ref_name }}
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authorization:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authorization:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authorization:${{ github.ref_name }}
