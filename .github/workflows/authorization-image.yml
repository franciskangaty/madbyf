name: Build and Push Authorization Server

on:
  push:
    branches:
      - production
    tags:
      - v*
    paths:
      - "authorization/**"

  workflow_dispatch:

env:
  IMAGE_NAME: madbyf-authorization

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./authorization
          file: ./authorization/Dockerfile
          push: true
          tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/authorization:latest
              ${{ secrets.DOCKERHUB_USERNAME }}/authorization:${{ github.sha }}
              ${{ secrets.DOCKERHUB_USERNAME }}/authorization:${{ github.ref_name }}
