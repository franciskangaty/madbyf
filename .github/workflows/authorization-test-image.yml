name: Build and Push Authorization Server (Test)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "authorization/**"

  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM (Java 25)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the native image container automatically using Buildpacks
      # The plugin creates the image directly in the local runner daemon
      - name: Build Native Container Image
        run: |
          cd authorization
          ./mvnw spring-boot:build-image -Pnative \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/authorization:test \
            -DskipTests

      # Tag additional variations if needed and push them to Docker Hub
      - name: Tag and Push Images
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test-${{ github.sha }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test-${{ github.ref_name }}
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test-${{ github.ref_name }}
