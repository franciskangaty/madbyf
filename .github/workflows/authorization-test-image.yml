name: Build and Push Authorization Server (Test)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "authorization/**"

  workflow_dispatch:

env:
  IMAGE_NAME: authorization-test

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Test Image
        uses: docker/build-push-action@v6
        with:
          context: ./authorization
          file: ./authorization/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test
            ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/authorization:test-${{ github.ref_name }}
