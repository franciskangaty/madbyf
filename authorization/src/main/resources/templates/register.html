<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Register - Authorization Server</title>
</head>
<body>
<main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-12 flex items-center justify-center">
    <div class="max-w-xl w-full space-y-8 bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-100 dark:border-gray-700">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 dark:text-white">
                Create a new account
            </h2>
        </div>
        <form id="registerForm" class="mt-8 space-y-6" onsubmit="event.preventDefault(); submitRegisterForm();">
            <div id="errorMessage" class="hidden bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-md text-sm"></div>
            <div id="successMessage" class="hidden bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 text-green-600 dark:text-green-400 px-4 py-3 rounded-md text-sm">
                Registration successful! <a href="/login" class="underline font-medium">Click here to login</a>.
            </div>

            <div class="grid grid-cols-1 gap-y-4 gap-x-4 sm:grid-cols-2">
                <div class="sm:col-span-2">
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Username</label>
                    <input id="username" name="username" type="text" pattern="^[a-zA-Z0-9_-]{3,20}$" required title="Username must be 3-20 characters long and contain only letters, numbers, hyphens, and underscores" class="appearance-none rounded-md block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm input-error mt-1">
                </div>
                <div>
                    <label for="firstName" class="block text-sm font-medium text-gray-700 dark:text-gray-300">First Name</label>
                    <input id="firstName" name="firstName" type="text" required class="appearance-none rounded-md block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm input-error mt-1">
                </div>
                <div>
                    <label for="lastName" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Last Name</label>
                    <input id="lastName" name="lastName" type="text" class="appearance-none rounded-md block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm mt-1">
                </div>
                <div class="sm:col-span-2">
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                    <input id="password" name="password" type="password" pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z]).{8,}$" required title="Password must be at least 8 characters long and contain at least one digit, one lowercase, and one uppercase letter" class="appearance-none rounded-md block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm input-error mt-1">
                </div>
            </div>

            <div>
                <button type="submit" id="submitBtn" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                    Register
                </button>
            </div>
        </form>
    </div>

    <script>
        async function submitRegisterForm() {
            const form = document.getElementById('registerForm');
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const payload = {
                username: form.username.value,
                firstName: form.firstName.value,
                lastName: form.lastName.value,
                password: form.password.value,
                roles: ["USER"],
                contacts: []
            };

            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            btn.disabled = true;
            btn.innerHTML = 'Registering...';
            errorDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/v1/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    form.reset();
                    successDiv.classList.remove('hidden');
                } else {
                    const data = await response.json().catch(() => ({}));
                    errorDiv.innerText = data.message || 'Registration failed. Please check your inputs.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = 'Network error occurred.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Register';
            }
        }
    </script>
</main>
</body>
</html>
