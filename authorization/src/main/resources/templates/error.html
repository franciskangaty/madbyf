<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Error - Authorization Server</title>
</head>
<body>
<main class="flex-grow flex flex-col justify-center max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-16">
    <div class="flex-shrink-0 flex justify-center">
        <a href="/" class="inline-flex">
            <span class="sr-only">AuthServer</span>
            <span class="text-4xl text-primary-600 font-bold">404</span>
        </a>
    </div>
    <div class="py-16">
        <div class="text-center">
            <p class="text-sm font-semibold text-primary-600 uppercase tracking-wide">Error</p>
            <h1 class="mt-2 text-4xl font-extrabold text-gray-900 dark:text-white tracking-tight sm:text-5xl">An error occurred.</h1>
            <p class="mt-2 text-base text-gray-500 dark:text-gray-400">Sorry, we couldn't process your request.</p>
            <div class="mt-6">
                <a href="/" class="text-base font-medium text-primary-600 hover:text-primary-500">Go back home<span aria-hidden="true"> &rarr;</span></a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
