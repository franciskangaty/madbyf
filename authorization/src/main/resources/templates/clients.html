<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Clients - Authorization Server</title>
</head>
<body>
<main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
    <div class="sm:flex sm:items-center">
        <div class="sm:flex-auto">
            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Clients</h1>
            <p class="mt-2 text-sm text-gray-700 dark:text-gray-300">A list of all OAuth 2.0 registered clients in your system.</p>
        </div>
        <div class="mt-4 sm:mt-0 sm:ml-16 sm:flex-none">
            <a href="/client-form" class="inline-flex items-center justify-center rounded-md border border-transparent bg-primary-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 sm:w-auto">
                Add Client
            </a>
        </div>
    </div>
    
    <div class="mt-8 flex flex-col">
        <div class="-my-2 -mx-4 overflow-x-auto sm:-mx-6 lg:-mx-8">
            <div class="inline-block min-w-full py-2 align-middle md:px-6 lg:px-8">
                <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 rounded-lg">
                    <table class="min-w-full divide-y divide-gray-300 dark:divide-gray-700">
                        <thead class="bg-gray-50 dark:bg-gray-800">
                            <tr>
                                <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 dark:text-white sm:pl-6">Client ID</th>
                                <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900 dark:text-white">Name</th>
                                <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900 dark:text-white">Grant Types</th>
                                <th scope="col" class="relative py-3.5 pl-3 pr-4 sm:pr-6">
                                    <span class="sr-only">Actions</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="clientsList" class="divide-y divide-gray-200 dark:divide-gray-700 bg-white dark:bg-gray-900">
                            <tr>
                                <td colspan="4" class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 dark:text-gray-400 text-center">Loading clients...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/v1/clients');
                if (res.ok) {
                    const page = await res.json();
                    const tbody = document.getElementById('clientsList');
                    tbody.innerHTML = '';
                    if (page.content && page.content.length > 0) {
                        page.content.forEach(client => {
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 dark:text-white sm:pl-6">${client.clientId}</td>
                                <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 dark:text-gray-400">${client.clientName}</td>
                                <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 dark:text-gray-400">${client.authorizationGrantTypes.join(', ')}</td>
                                <td class="relative whitespace-nowrap py-4 pl-3 pr-4 text-right text-sm font-medium sm:pr-6">
                                    <button onclick="deleteClient('${client.id}')" class="text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300">Delete</button>
                                </td>
                            `;
                            tbody.appendChild(tr);
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="4" class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 dark:text-gray-400 text-center">No clients found.</td></tr>';
                    }
                } else {
                    document.getElementById('clientsList').innerHTML = '<tr><td colspan="4" class="text-red-500 text-center py-4">Error loading clients</td></tr>';
                }
            } catch (err) {
                document.getElementById('clientsList').innerHTML = '<tr><td colspan="4" class="text-red-500 text-center py-4">Failed to fetch clients</td></tr>';
            }
        });

        async function deleteClient(id) {
            if (confirm('Are you sure you want to delete this client?')) {
                const res = await fetch(`/api/v1/clients/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    location.reload();
                } else {
                    alert('Failed to delete client.');
                }
            }
        }
    </script>
</main>
</body>
</html>
