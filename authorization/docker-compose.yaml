services:
  spring:
    build: .
    container_name: authorization-app
    env_file:
      - .env
    ports:
      - "${AUTHORIZATION_SERVER_PORT}:8080"
    depends_on:
      - postgres
    networks:
      - authorization

  postgres:
    image: postgres:alpine
    container_name: authorization-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTHORIZATION_POSTGRES_DB:-authorization}
      POSTGRES_USER: ${AUTHORIZATION_POSTGRES_USER:-authorization}
      POSTGRES_PASSWORD: ${AUTHORIZATION_POSTGRES_PASSWORD:-authorization_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - authorization
    healthcheck:
#      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:

networks:
  authorization:
    driver: bridge